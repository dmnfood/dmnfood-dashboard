<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 홈 — 들메내식품</title>
<link rel="stylesheet" href="/style.css">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvJ4VsXqP0KBP3JTTVswMfXzLKKnH5iXY",
    authDomain: "dmnfood-dashboard.firebaseapp.com",
    projectId: "dmnfood-dashboard",
    storageBucket: "dmnfood-dashboard.appspot.com",
    messagingSenderId: "123456789",
    appId: "1:123456789:web:abcdef"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  onAuthStateChanged(auth, user => {
    if (!user) {
      window.location.href = '/loginpage.html';
      return;
    }
    /* 사용자 이름 표시 */
    const nameEl = document.getElementById('user-name');
    if (nameEl) nameEl.textContent = user.email.split('@')[0];
  });

  window.handleLogout = async function() {
    await signOut(auth);
    window.location.href = '/loginpage.html';
  };
</script>
</head>
<body>

<!-- 배경 블롭 -->
<div class="blobs"><div class="b1"></div><div class="b2"></div></div>

<!-- 네비게이션 -->
<div class="nw">
  <div class="ngb"><div class="ns">
    <div class="nl">
      <div class="nav-logo">들</div>
      <div>
        <div class="nav-title">들메내식품 대시보드</div>
        <div class="nav-sub">주식회사 들메내식품 · 내부 업무 시스템</div>
      </div>
    </div>
    <div class="nav-actions">
      <span class="nav-meta" id="user-name"></span>
      <button class="btn btn-danger" style="padding:6px 14px;font-size:11px;margin-top:0;" onclick="handleLogout()">
        로그아웃
      </button>
    </div>
  </div></div>
</div>

<!-- 메인 -->
<div class="main">

  <div class="panel-title" style="margin-bottom:8px;">메뉴</div>
