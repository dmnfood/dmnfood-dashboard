<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>들메내식품 · 미청구채권 현황</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: radial-gradient(1200px 600px at 20% 0%, #070b14, #0b1220);
      --card: rgba(255, 255, 255, 0.06);
      --card-s: rgba(255, 255, 255, 0.09);
      --card-w: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.10);
      --shadow: 0 22px 56px rgba(0, 0, 0, .52);
      --t0: rgba(255, 255, 255, .92);
      --t1: rgba(255, 255, 255, .62);
      --t2: rgba(255, 255, 255, .38);
      --in-bg: rgba(255, 255, 255, .06);
      --in-br: rgba(255, 255, 255, .14);
      --in-ph: rgba(255, 255, 255, .35);
      --tb-br: rgba(255, 255, 255, .08);
      --tb-hd: rgba(255, 255, 255, .05);
      --tb-hv: rgba(255, 255, 255, .04);
      --blob1: linear-gradient(135deg, #22d3ee, #0ea5e9, #d946ef);
      --blob2: linear-gradient(135deg, #d946ef, #6366f1, #22d3ee);
      --rv: #f87171;
      --rv-bg: rgba(248, 113, 113, .12);
      --nm: #60a5fa;
      --nm-bg: rgba(96, 165, 250, .12);
      --zr: #4ade80;
      --zr-bg: rgba(74, 222, 128, .12);
      --ac: #fbbf24;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 93%;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--t0);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    .blobs {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .b1,
    .b2 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .3;
    }

    .b1 {
      width: 520px;
      height: 520px;
      top: -130px;
      left: -130px;
      background-image: var(--blob1);
    }

    .b2 {
      width: 580px;
      height: 580px;
      bottom: -170px;
      right: -170px;
      background-image: var(--blob2);
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background: #070b14;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 999;
    }

    .loading-screen.hidden {
      display: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, .12);
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .app-header {
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn {
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--t2);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s, color .15s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--t0);
    }

    .app-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--t0);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22d3ee;
    }

    .user-chip {
      font-size: 11px;
      color: var(--t2);
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-logout-sm {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      color: var(--t2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-logout-sm:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--t0);
    }

    .page-main {
      max-width: 1360px;
      margin: 0 auto;
      padding: 24px 28px 60px;
      position: relative;
      z-index: 10;
    }

    /* Ecount 패널 */
    .auto-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 20px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .03);
    }

    .panel-icon {
      width: 28px;
      height: 28px;
      background: rgba(34, 211, 238, .12);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .panel-header-text h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--t0);
    }

    .panel-header-text p {
      font-size: 11px;
      color: var(--t2);
      margin-top: 1px;
    }

    .panel-body {
      padding: 20px;
    }

    .auto-row {
      display: flex;
      align-items: flex-end;
      gap: 14px;
      flex-wrap: wrap;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .field-group select,
    .field-group input[type="month"] {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--in-br);
      border-radius: 6px;
      background: var(--in-bg);
      color: var(--t0);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .field-group input[type="month"] {
      min-width: 140px;
    }

    .field-group select {
      min-width: 160px;
    }

    .field-group select option {
      background: #0b1220;
    }

    .date-sep {
      color: var(--t2);
      font-size: 16px;
      padding-bottom: 8px;
    }

    .btn-actions {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .btn-fetch {
      height: 36px;
      padding: 0 20px;
      background: linear-gradient(135deg, #22d3ee, #6366f1);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s;
      box-shadow: 0 2px 12px rgba(34, 211, 238, .25);
    }

    .btn-fetch:hover {
      opacity: .88;
    }

    .btn-upload {
      height: 36px;
      padding: 0 20px;
      background: linear-gradient(135deg, #4ade80, #16a34a);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s;
      box-shadow: 0 2px 12px rgba(74, 222, 128, .25);
    }

    .btn-upload:hover {
      opacity: .88;
    }

    .auto-status {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 14px;
    }

    .auto-status.running {
      display: flex;
      background: var(--nm-bg);
      color: var(--nm);
      border: 1px solid rgba(96, 165, 250, .25);
    }

    .auto-status.done {
      display: flex;
      background: var(--zr-bg);
      color: var(--zr);
      border: 1px solid rgba(74, 222, 128, .25);
    }

    .auto-status.error {
      display: flex;
      background: var(--rv-bg);
      color: var(--rv);
      border: 1px solid rgba(248, 113, 113, .25);
    }

    .spinner-sm {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    /* bond_v4 dashboard */
    .p {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pt {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: var(--t2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pt::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .kg {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 13px;
      margin-bottom: 22px;
    }

    .kp {
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
    }

    .kp::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
    }

    .kp.rv::before {
      background: var(--rv);
    }

    .kp.nm::before {
      background: var(--nm);
    }

    .kp.zr::before {
      background: var(--zr);
    }

    .kp.to::before {
      background: var(--ac);
    }

    .kb {
      position: absolute;
      top: 14px;
      right: 15px;
      font-size: 22px;
      opacity: .10;
    }

    .kl {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: var(--t2);
      margin-bottom: 8px;
    }

    .kv {
      font-family: 'JetBrains Mono', monospace;
      font-size: 27px;
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
    }

    .kp.rv .kv {
      color: var(--rv);
    }

    .kp.nm .kv {
      color: var(--nm);
    }

    .kp.zr .kv {
      color: var(--zr);
    }

    .kp.to .kv {
      color: var(--t0);
    }

    .ks {
      font-size: 10px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 5px;
    }

    .cr {
      display: grid;
      grid-template-columns: 210px 1fr;
      gap: 13px;
      margin-bottom: 22px;
    }

    .cp {
      padding: 18px 22px;
    }

    .gb {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .gr {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .gn {
      width: 110px;
      font-size: 11px;
      color: var(--t2);
      text-align: right;
      flex-shrink: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .gt {
      flex: 1;
      height: 5px;
      background: rgba(255, 255, 255, .07);
      border-radius: 3px;
      overflow: hidden;
    }

    .gf {
      height: 100%;
      border-radius: 3px;
      background: var(--rv);
      transition: width .5s;
    }

    .gv {
      width: 130px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--t2);
    }

    .ct {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .tg {
      display: flex;
      gap: 3px;
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 4px;
      backdrop-filter: blur(14px);
    }

    .tb {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--t2);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: .15s;
    }

    .tb:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--t1);
    }

    .tb.a {
      background: rgba(255, 255, 255, .10);
      color: var(--t0);
      border: 1px solid var(--border);
    }

    .tb.rv.a {
      color: var(--rv);
    }

    .tb.nm.a {
      color: var(--nm);
    }

    .tb.zr.a {
      color: var(--zr);
    }

    .tb.al.a {
      color: var(--ac);
    }

    .sb {
      flex: 1;
      max-width: 210px;
      background: var(--in-bg);
      border: 1px solid var(--in-br);
      border-radius: 10px;
      padding: 7px 12px;
      color: var(--t0);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      outline: none;
      transition: .15s;
      backdrop-filter: blur(14px);
    }

    .sb:focus {
      border-color: rgba(34, 211, 238, .4);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, .08);
    }

    .sb::placeholder {
      color: var(--in-ph);
    }

    .gs-sel {
      background: var(--in-bg);
      border: 1px solid var(--in-br);
      border-radius: 10px;
      padding: 7px 12px;
      color: var(--t0);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      outline: none;
      cursor: pointer;
    }

    .gs-sel option {
      background: #0b1220;
      color: rgba(255, 255, 255, .92);
    }

    .cnt-label {
      margin-left: auto;
      font-size: 11px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
    }

    .tw {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: var(--tb-hd);
      padding: 9px 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--t2);
      text-align: left;
      border-bottom: 1px solid var(--tb-br);
      white-space: nowrap;
    }

    tr.gh td {
      background: rgba(255, 255, 255, .025);
      padding: 6px 14px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .4px;
      color: var(--t2);
      border-bottom: 1px solid var(--tb-br);
      border-top: 1px solid rgba(255, 255, 255, .05);
    }

    tr.co {
      border-bottom: 1px solid var(--tb-br);
      transition: background .1s;
    }

    tr.co:hover {
      background: var(--tb-hv);
    }

    tr.co:last-child {
      border-bottom: none;
    }

    .cob {
      display: grid;
      grid-template-columns: 178px 154px 1fr;
      align-items: stretch;
    }

    .cm {
      padding: 12px 14px;
      border-right: 1px solid var(--tb-br);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .cn {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -.2px;
    }

    .cc {
      font-size: 10px;
      color: var(--t2);
      font-family: 'JetBrains Mono', monospace;
    }

    .cg {
      display: inline-block;
      margin-top: 4px;
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .06);
      color: var(--t2);
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .cb2 {
      padding: 12px 14px;
      border-right: 1px solid var(--tb-br);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .ba {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.5px;
    }

    .ba.pos {
      color: var(--rv);
    }

    .ba.neg {
      color: var(--nm);
    }

    .ba.zer {
      color: var(--zr);
    }

    .bl {
      font-size: 10px;
      color: var(--t2);
    }

    .pill {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 3px;
      letter-spacing: .3px;
    }

    .pill.rv {
      background: var(--rv-bg);
      color: var(--rv);
      border: 1px solid rgba(248, 113, 113, .25);
    }

    .pill.nm {
      background: var(--nm-bg);
      color: var(--nm);
      border: 1px solid rgba(96, 165, 250, .25);
    }

    .pill.zr {
      background: var(--zr-bg);
      color: var(--zr);
      border: 1px solid rgba(74, 222, 128, .25);
    }

    .cmd {
      overflow-x: auto;
    }

    .mt {
      width: 100%;
      border-collapse: collapse;
      min-width: 640px;
    }

    .mt th,
    .mt td {
      padding: 3px 10px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px solid rgba(255, 255, 255, .04);
      white-space: nowrap;
      color: var(--t1);
    }

    .mt th {
      background: rgba(255, 255, 255, .03);
      color: var(--t2);
      font-size: 9px;
      font-weight: 700;
      text-align: right;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
    }

    .mt th:first-child,
    .mt td:first-child {
      color: var(--t2);
      font-size: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      border-right: 1px solid rgba(255, 255, 255, .06);
      width: 58px;
      background: rgba(255, 255, 255, .02);
      font-weight: 600;
      text-align: left;
    }

    .mt th:first-child {
      background: rgba(255, 255, 255, .04);
    }

    .mt td {
      text-align: right;
    }

    .mt tr:last-child td {
      border-bottom: none;
    }

    .mt .rb td {
      font-weight: 700;
      color: var(--t0);
    }

    .mt .rb .pv {
      color: var(--ac);
    }

    .mt .rb .nv {
      color: var(--rv);
    }

    .empty {
      padding: 52px;
      text-align: center;
      color: var(--t2);
    }

    ::-webkit-scrollbar {
      width: 7px;
      height: 7px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .14);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, .24);
    }

    .auth-hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div class="blobs">
    <div class="b1"></div>
    <div class="b2"></div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);">인증 확인 중...</div>
  </div>

  <div id="mainContent" class="auth-hidden">

    <header class="app-header">
      <div class="header-left">
        <a href="/dashboard/home.html" class="back-btn">← 홈</a>
        <div class="app-title">
          <div class="dot"></div>미청구채권 현황
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="user-chip" id="userChip"></div>
        <div class="user-chip" id="nav-meta" style="display:none;"></div>
        <button class="btn-logout-sm" onclick="handleLogout()">로그아웃</button>
      </div>
    </header>

    <main class="page-main">

      <!-- Ecount 패널 -->
      <div class="auto-panel">
        <div class="panel-header">
          <div class="panel-icon">🔗</div>
          <div class="panel-header-text">
            <h2>Ecount 연동</h2>
            <p>버튼 클릭 한 번으로 Ecount에서 자동 다운로드</p>
          </div>
        </div>
        <div class="panel-body">
          <div class="auto-row">
            <div class="field-group">
              <label>데이터 소스</label>
              <select>
                <option>월별채권증감내역</option>
              </select>
            </div>
            <div class="field-group">
              <label>시작 월</label>
              <input type="month" id="startMonth">
            </div>
            <div class="date-sep">—</div>
            <div class="field-group">
              <label>종료 월</label>
              <input type="month" id="endMonth">
            </div>
            <div class="btn-actions">
              <button class="btn-fetch" onclick="triggerFetch()">⚡ Ecount에서 가져오기</button>
              <button class="btn-upload" onclick="document.getElementById('manual-file-input').click()">📂 Excel 직접
                업로드</button>
              <input type="file" id="manual-file-input" accept=".xlsx,.xls" style="display:none"
                onchange="handleManualFile(this)">
              <input type="file" id="ecount-file-input" accept=".xlsx,.xls" style="display:none"
                onchange="handleManualFile(this)">
            </div>
          </div>
          <div class="auto-status" id="autoStatus"></div>
        </div>
      </div>

      <!-- 대시보드 -->
      <div id="dash" style="display:none">
        <div class="kg" id="kg"></div>
        <div class="cr">
          <div class="p cp">
            <div class="pt">분류 현황</div>
            <div style="height:165px;position:relative;"><canvas id="dc"></canvas></div>
          </div>
          <div class="p cp">
            <div class="pt">그룹별 검토 필요 잔액</div>
            <div class="gb" id="gb"></div>
          </div>
        </div>
        <div class="ct">
          <div class="tg">
            <button class="tb rv a" data-c="rv" onclick="setTab(this)">⚠ 검토 필요</button>
            <button class="tb nm" data-c="nm" onclick="setTab(this)">✓ 정상 미수금</button>
            <button class="tb zr" data-c="zr" onclick="setTab(this)">◉ 잔액 없음</button>
            <button class="tb al" data-c="al" onclick="setTab(this)">전체</button>
          </div>
          <input class="sb" type="text" placeholder="거래처 검색..." oninput="draw()">
          <select class="gs-sel" id="gsel" onchange="draw()">
            <option value="">전체 그룹</option>
          </select>
          <span class="cnt-label" id="cnt"></span>
        </div>
        <div class="p" style="overflow:hidden;">
          <div class="tw">
            <table>
              <thead>
                <tr>
                  <th>거래처</th>
                  <th>잔액</th>
                  <th id="month-headers"></th>
                </tr>
              </thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
          <div class="empty" id="emp" style="display:none">검색 결과가 없습니다.</div>
        </div>
      </div>

      <!-- 초기 안내 -->
      <div class="p empty" id="init">
        <div style="font-size:38px;opacity:.3;margin-bottom:10px;">📊</div>
        <div style="font-size:13px;color:var(--t2);">Ecount에서 가져오거나 Excel 파일을 직접 업로드하면 분석이 시작됩니다.</div>
      </div>

    </main>
  </div>

  <!-- Firebase 인증 -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAlvRWMpYV5Cq2vb0XxpA4t56KuByj8KuE",
      authDomain: "dmnfood-erp.firebaseapp.com",
      projectId: "dmnfood-erp",
      storageBucket: "dmnfood-erp.firebasestorage.app",
      messagingSenderId: "918686575195",
      appId: "1:918686575195:web:699d961aa0a092ee9ead7e",
    };
    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);
    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = '/'; return; }
      document.getElementById('userChip').textContent = user.email.split('@')[0];
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('auth-hidden');
      initApp();
    });
    window.handleLogout = async () => {
      if (!confirm('로그아웃 하시겠습니까?')) return;
      await signOut(auth);
      window.location.href = '/';
    };
  </script>

  <script>
    const GRP = ['매출처(학교급식)', '매출처(유통)', '매출처(일반)', '매출처(온라인)', '매출처(예식장)', '매출처(일회성)', '매출처(세금계산서X)', '매출처(수출)', '기부단체', '(그룹 미지정)'];
    const fmt = n => new Intl.NumberFormat('ko-KR').format(n);
    const gIdx = g => { const i = GRP.indexOf(g); return i < 0 ? 99 : i; };
    const sortArr = a => [...a].sort((x, y) => { const gi = gIdx(x.그룹) - gIdx(y.그룹); return gi || Math.abs(y.잔액) - Math.abs(x.잔액); });

    let D = null, cat = 'rv', dc = null;

    function initApp() {
      const now = new Date();
      const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('startMonth').value = ym;
      document.getElementById('endMonth').value = ym;
    }

    function triggerFetch() {
      const s = document.getElementById('startMonth').value;
      const e = document.getElementById('endMonth').value;
      if (!s || !e) return alert('조회 기간을 모두 입력해주세요.');
      if (s > e) return alert('시작 월이 종료 월보다 늦을 수 없습니다.');
      setStatus('running', '⚡ Ecount 자동화 실행 중...');
      const msg = `#ecount-auto-fetch\n보고서: 월별채권증감내역\n조회기간: ${s} ~ ${e}\nEcount 메뉴: 회계 > 채권/채무 > 월별채권증감내역\n완료 후: 이 탭의 파일 입력(id="ecount-file-input")에 다운로드된 파일을 업로드해줘.`;
      if (typeof window.sendPrompt === 'function') window.sendPrompt(msg);
      else setStatus('error', '⚠️ Claude in Chrome이 연결되지 않았습니다.');
    }

    function handleManualFile(input) {
      if (input.files[0]) load(input.files[0]);
      input.value = '';
    }

    function setStatus(type, msg) {
      const el = document.getElementById('autoStatus');
      el.className = 'auto-status ' + type;
      el.innerHTML = type === 'running' ? `<div class="spinner-sm"></div> ${msg}` : msg;
    }

    function load(file) {
      setStatus('running', `📂 "${file.name}" 읽는 중...`);
      const r = new FileReader();
      r.onload = e => {
        try {
          const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          parse(XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true }));
        } catch (err) {
          setStatus('error', `❌ 파일 처리 오류: ${err.message}`);
        }
      };
      r.readAsArrayBuffer(file);
    }

    function parse(rows) {
      const hrow = rows[1] || [];
      const months = [];
      for (let c = 4; c < hrow.length; c++) months.push(hrow[c] ? String(hrow[c]).trim() : `M${c}`);

      const companies = []; let cur = null;
      for (let i = 2; i < rows.length; i++) {
        const r = rows[i], g = r[3];
        if (!['매출', '수금', '기타할인등차액', '잔액', '미회수액'].includes(g)) continue;
        if (g === '매출') {
          const code = r[0], name = r[1];
          if ((!code && !name) || String(code) === '[누계]') { cur = null; continue; }
          cur = { 코드: String(code || ''), 명: String(name || ''), 그룹: r[2] || '(그룹 미지정)', rows: {} };
        }
        if (!cur) continue;
        cur.rows[g] = r.slice(4).map(v => typeof v === 'number' ? v : parseFloat(v) || 0);
        if (g === '미회수액') {
          const zr = cur.rows['잔액'] || [], mr = cur.rows['매출'] || [];
          cur.잔액 = (zr[zr.length - 1]) || 0;
          cur.apr = (mr[mr.length - 2]) || 0;
          companies.push(cur); cur = null;
        }
      }

      const rv = [], nm = [], zr = [];
      companies.forEach(c => {
        if (c.잔액 === 0) { c.cat = 'zr'; zr.push(c); }
        else if (c.잔액 > 0 && c.apr === c.잔액) { c.cat = 'nm'; nm.push(c); }
        else { c.cat = 'rv'; rv.push(c); }
      });

      const gs = {};
      rv.forEach(c => { if (!gs[c.그룹]) gs[c.그룹] = { n: 0, b: 0 }; gs[c.그룹].n++; gs[c.그룹].b += c.잔액; });

      const lastMonth = months.length >= 2 ? months[months.length - 2] : months[months.length - 1] || '최신월';

      D = {
        months, companies, rv: sortArr(rv), nm: sortArr(nm), zr: sortArr(zr), gs, lastMonth,
        sum: {
          rv: rv.length, nm: nm.length, zr: zr.length, tot: companies.length,
          rvb: rv.reduce((s, c) => s + c.잔액, 0), nmb: nm.reduce((s, c) => s + c.잔액, 0)
        }
      };

      document.getElementById('init').style.display = 'none';
      document.getElementById('dash').style.display = 'block';
      const navMeta = document.getElementById('nav-meta');
      navMeta.style.display = 'block';
      navMeta.textContent = '기준일 ' + new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' }) + ' · 총 ' + D.sum.tot + '개사';
      setStatus('done', `✅ "${D.sum.tot}개 거래처" 분석 완료`);

      buildKPI(); buildDonut(); buildGrpBars(); buildSel(); draw();
    }

    function buildKPI() {
      const s = D.sum, lastMon = D.lastMonth;
      document.getElementById('kg').innerHTML = [
        { c: 'rv', i: '⚠', l: '검토 필요', v: s.rv, s: fmt(s.rvb) + '원' },
        { c: 'nm', i: '✓', l: lastMon + ' 미수금 (정상)', v: s.nm, s: fmt(s.nmb) + '원' },
        { c: 'zr', i: '◉', l: '정리 완료', v: s.zr, s: '잔액 0' },
        { c: 'to', i: '∑', l: '전체 거래처', v: s.tot, s: '총잔액 ' + fmt(s.rvb + s.nmb) + '원' },
      ].map(k => `<div class="p kp ${k.c}"><div class="kb">${k.i}</div><div class="kl">${k.l}</div>
    <div class="kv">${k.v}<span style="font-size:13px;font-weight:400;color:var(--t2)"> 개사</span></div>
    <div class="ks">${k.s}</div></div>`).join('');
    }

    function buildDonut() {
      if (dc) { dc.destroy(); dc = null; }
      const s = D.sum;
      dc = new Chart(document.getElementById('dc'), {
        type: 'doughnut',
        data: {
          labels: ['검토 필요', '정상 미수금', '잔액 없음'],
          datasets: [{
            data: [s.rv, s.nm, s.zr],
            backgroundColor: ['rgba(248,113,113,.75)', 'rgba(96,165,250,.75)', 'rgba(74,222,128,.75)'],
            borderColor: 'rgba(255,255,255,.06)', borderWidth: 2, hoverOffset: 4
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, cutout: '64%',
          plugins: {
            legend: { position: 'bottom', labels: { color: 'rgba(255,255,255,.45)', font: { family: 'Noto Sans KR', size: 11 }, padding: 10, boxWidth: 10 } },
            tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw}개사` } }
          }
        }
      });
    }

    function buildGrpBars() {
      const gs = D.gs;
      const order = GRP.filter(g => gs[g]).concat(Object.keys(gs).filter(g => !GRP.includes(g)));
      const max = Math.max(...order.map(g => Math.abs(gs[g].b || 0)), 1);
      document.getElementById('gb').innerHTML = order.map(g => {
        const d = gs[g], bal = d.b || 0, pct = (Math.abs(bal) / max * 100).toFixed(1);
        const sh = g.replace('매출처', '').replace(/[()]/g, '') || g;
        return `<div class="gr"><div class="gn" title="${g}">${sh}</div>
      <div class="gt"><div class="gf" style="width:${pct}%"></div></div>
      <div class="gv">${d.n}사 · ${fmt(bal)}원</div></div>`;
      }).join('');
    }

    function buildSel() {
      const sel = document.getElementById('gsel');
      sel.innerHTML = '<option value="">전체 그룹</option>';
      [...new Set(D.companies.map(c => c.그룹))].sort().forEach(g => {
        const o = document.createElement('option'); o.value = g; o.textContent = g; sel.appendChild(o);
      });
    }

    function setTab(btn) {
      document.querySelectorAll('.tb').forEach(t => t.classList.remove('a'));
      btn.classList.add('a'); cat = btn.dataset.c; draw();
    }

    function draw() {
      if (!D) return;
      const q = document.querySelector('.sb').value.toLowerCase();
      const gf = document.getElementById('gsel').value;
      const pool = cat === 'al' ? [...D.rv, ...D.nm, ...D.zr] : D[cat] || [];
      const list = pool.filter(c => {
        if (gf && c.그룹 !== gf) return false;
        if (q && !c.명.toLowerCase().includes(q) && !c.코드.includes(q)) return false;
        return true;
      });
      document.getElementById('cnt').textContent = list.length + '개사';
      const tb = document.getElementById('tb');
      tb.innerHTML = '';
      if (!list.length) { document.getElementById('emp').style.display = 'block'; return; }
      document.getElementById('emp').style.display = 'none';

      const CL = { rv: '⚠ 검토필요', nm: '✓ ' + D.lastMonth + ' 정상', zr: '◉ 완료' };
      let lg = null;

      const mh = document.getElementById('month-headers');
      if (mh) mh.outerHTML = `<th colspan="${D.months.length + 1}" style="padding-left:8px;">월별 상세</th>`;

      list.forEach(c => {
        if (c.그룹 !== lg) {
          lg = c.그룹;
          const gr = document.createElement('tr'); gr.className = 'gh';
          gr.innerHTML = `<td colspan="3">▶  ${c.그룹}</td>`; tb.appendChild(gr);
        }
        const rows5 = ['매출', '수금', '기타할인등차액', '잔액', '미회수액'];
        const bc = c.잔액 > 0 ? 'pos' : c.잔액 < 0 ? 'neg' : 'zer';

        const hdrCells = '<td style="background:rgba(255,255,255,.04);font-size:9px;font-weight:700;color:var(--t2);">구분</td>' +
          D.months.map(m => `<td style="background:rgba(255,255,255,.04);font-size:9px;font-weight:700;color:var(--t2);text-align:right;">${m}</td>`).join('');

        const mk = (l) => {
          const d = c.rows[l] || [];
          const ib = l === '잔액';
          const cells = D.months.map((_, mi) => {
            const v = d[mi] || 0;
            let cl = ''; if (ib) { cl = v > 0 ? 'pv' : v < 0 ? 'nv' : ''; }
            return `<td class="${cl}">${v ? fmt(v) : ''}</td>`;
          }).join('');
          return `<tr class="${ib ? 'rb' : ''}"><td>${l}</td>${cells}</tr>`;
        };

        const tr = document.createElement('tr'); tr.className = 'co';
        tr.innerHTML = `<td colspan="3"><div class="cob">
      <div class="cm"><div class="cn">${c.명}</div><div class="cc">${c.코드}</div>
        <div class="cg" title="${c.그룹}">${c.그룹.replace('매출처', '').replace(/[()]/g, '') || c.그룹}</div></div>
      <div class="cb2"><div class="ba ${bc}">${fmt(c.잔액)}원</div><div class="bl">최종잔액</div>
        <div class="pill ${c.cat}">${CL[c.cat]}</div></div>
      <div class="cmd"><table class="mt">
        <thead><tr>${hdrCells}</tr></thead>
        <tbody>${rows5.map(mk).join('')}</tbody>
      </table></div>
    </div></td>`;
        tb.appendChild(tr);
      });
    }
  </script>
</body>
