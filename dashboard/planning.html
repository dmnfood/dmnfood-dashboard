<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DMN Food - 계획 비서</title>
  <link rel="stylesheet" href="/dashboard/style.css">
  <link rel="stylesheet" href="/dashboard/css/planning.css">
  <style>
    .auth-hidden { display: none !important; }
    .loading-screen {
      position: fixed;
      inset: 0;
      background: #070b14;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 999;
    }
    .loading-screen.hidden { display: none; }
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, .12);
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .app-header {
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 0 clamp(18px, 2.4vw, 34px);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .back-btn, .btn-logout-sm {
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--t2);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .back-btn:hover, .btn-logout-sm:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--t0);
    }
    .app-title {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--t0);
      font-size: 14px;
      font-weight: 700;
    }
    .app-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22d3ee;
    }
    .user-chip {
      font-size: 11px;
      color: var(--t2);
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }
    .page-main {
      width: min(100%, 1760px);
      margin: 0 auto;
      padding: clamp(18px, 2.2vw, 34px) clamp(16px, 2.4vw, 40px) 80px;
      position: relative;
      z-index: 10;
    }
  </style>
</head>

<body>
  <div class="blobs">
    <div class="b1"></div>
    <div class="b2"></div>
  </div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
  </div>

  <div id="mainContent" class="auth-hidden">
    <header class="app-header">
      <div class="header-left">
        <a href="/home" class="back-btn">뒤로</a>
        <div class="app-title"><span class="dot"></span>계획 비서</div>
      </div>
      <div class="header-right">
        <div class="user-chip" id="userChip"></div>
        <button class="btn-logout-sm" onclick="handleLogout()">로그아웃</button>
      </div>
    </header>

    <main class="page-main planning-shell">
      <section class="planning-hero">
        <div>
          <div class="planning-kicker">운영 계획</div>
          <h1 class="planning-title">업무 흐름과 일정 관리</h1>
          <p class="planning-subtitle">거래처, 생산, 품질, 자금 업무를 한 화면에서 일정 흐름으로 확인합니다.</p>
        </div>
        <button class="planning-btn" id="openSummaryBtn">시작 요약</button>
      </section>

      <section class="planning-stats" id="stats"></section>

      <section class="planning-grid">
        <aside class="planning-panel">
          <div class="planning-panel-head">
            <div>
              <div class="planning-panel-title" id="formTitle">업무 추가</div>
              <div class="planning-panel-sub">프로젝트, 단계, 시작일, 기한을 기준으로 업무를 등록합니다.</div>
            </div>
          </div>
          <div class="planning-panel-body">
            <form class="planning-form" id="taskForm">
              <input type="hidden" id="taskId">
              <div class="planning-field">
                <label for="taskTitle">업무명</label>
                <input class="planning-input" id="taskTitle" required maxlength="120" placeholder="예: 미수금 확인">
              </div>
              <div class="planning-row">
                <div class="planning-field">
                  <label for="taskProject">프로젝트</label>
                  <input class="planning-input" id="taskProject" maxlength="80" placeholder="예: 자금/손익 관리">
                </div>
                <div class="planning-field">
                  <label for="taskPhase">단계</label>
                  <input class="planning-input" id="taskPhase" maxlength="60" placeholder="예: 확인">
                </div>
              </div>
              <div class="planning-row">
                <div class="planning-field">
                  <label for="taskStartDate">시작일</label>
                  <input class="planning-input" id="taskStartDate" type="date">
                </div>
                <div class="planning-field">
                  <label for="taskDueDate">기한 날짜</label>
                  <input class="planning-input" id="taskDueDate" type="date">
                </div>
              </div>
              <div class="planning-row">
                <div class="planning-field">
                  <label for="taskDueTime">기한 시간</label>
                  <input class="planning-input" id="taskDueTime" type="time">
                </div>
                <div class="planning-field">
                  <label for="taskOwner">담당자</label>
                  <input class="planning-input" id="taskOwner" maxlength="60" placeholder="예: 생산관리">
                </div>
              </div>
              <div class="planning-row">
                <div class="planning-field">
                  <label for="taskPriority">우선순위</label>
                  <select class="planning-select" id="taskPriority">
                    <option value="normal">보통</option>
                    <option value="low">낮음</option>
                    <option value="high">높음</option>
                    <option value="urgent">긴급</option>
                  </select>
                </div>
                <div class="planning-field">
                  <label for="taskStatus">상태</label>
                  <select class="planning-select" id="taskStatus">
                    <option value="todo">대기</option>
                    <option value="doing">진행 중</option>
                    <option value="done">완료</option>
                  </select>
                </div>
              </div>
              <div class="planning-field">
                <label for="taskNotes">메모</label>
                <textarea class="planning-textarea" id="taskNotes" maxlength="500" placeholder="필요한 후속 조치나 확인 사항을 적어두세요"></textarea>
              </div>
              <div class="planning-actions">
                <button class="planning-btn primary" type="submit">업무 저장</button>
                <button class="planning-btn" type="button" id="resetFormBtn">초기화</button>
              </div>
            </form>
          </div>
        </aside>

        <section class="planning-panel">
          <div class="planning-panel-head">
            <div>
              <div class="planning-panel-title">업무 현황</div>
              <div class="planning-panel-sub" id="listMeta">진행 업무 0건</div>
            </div>
          </div>
          <div class="planning-panel-body">
            <div class="planning-filterbar">
              <div class="planning-tabs" id="bucketTabs">
                <button class="planning-tab active" data-filter="all">전체 업무</button>
                <button class="planning-tab" data-filter="overdue">지연 업무</button>
                <button class="planning-tab" data-filter="today">오늘 할 일</button>
                <button class="planning-tab" data-filter="upcoming">예정 업무</button>
                <button class="planning-tab" data-filter="urgent">긴급 업무</button>
                <button class="planning-tab" data-filter="done">완료</button>
              </div>
              <input class="planning-input" id="taskSearch" style="max-width:240px" placeholder="업무 검색">
            </div>
            <div class="planning-list" id="taskList"></div>
          </div>
        </section>
      </section>

      <section class="planning-panel planning-timeline-panel">
        <div class="planning-panel-head">
          <div>
            <div class="planning-panel-title">타임라인 · 업무 흐름</div>
            <div class="planning-panel-sub">프로젝트별 업무 기간, 기한, 의존 관계를 날짜 축에서 확인합니다.</div>
          </div>
          <div class="planning-timeline-legend">
            <span><i class="legend-dot urgent"></i>긴급/지연</span>
            <span><i class="legend-dot doing"></i>진행</span>
            <span><i class="legend-dot done"></i>완료</span>
          </div>
        </div>
        <div class="planning-timeline" id="timeline"></div>
      </section>
    </main>

    <div class="planning-modal-backdrop" id="summaryModal">
      <div class="planning-modal">
        <div class="planning-modal-head">
          <div class="planning-modal-title">시작 요약</div>
          <button class="planning-btn icon" id="closeSummaryBtn" aria-label="요약 닫기">x</button>
        </div>
        <div class="planning-summary" id="summaryBody"></div>
      </div>
    </div>

    <div class="planning-toast-wrap" id="toastWrap"></div>

    <section class="planning-ai" id="aiPanel">
      <div class="planning-ai-head">
        <div class="planning-ai-title">로컬 계획 비서</div>
        <div class="planning-ai-sub">현재 로컬 업무 데이터만 기준으로 답변합니다.</div>
      </div>
      <div class="planning-ai-log" id="aiLog"></div>
      <form class="planning-ai-form" id="aiForm">
        <input class="planning-input" id="aiInput" placeholder="무엇에 집중할지 물어보세요">
        <button class="planning-btn primary" type="submit">질문</button>
      </form>
    </section>
    <button class="planning-ai-toggle" id="aiToggle" aria-label="계획 비서 열기">AI</button>
  </div>

  <script src="/dashboard/js/planning-data.js"></script>
  <script src="/dashboard/js/planning-ai.js"></script>
  <script src="/dashboard/js/planning-reminders.js"></script>
  <script src="/dashboard/js/planning-ui.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAlvRWMpYV5Cq2vb0XxpA4t56KuByj8KuE",
      authDomain: "dmnfood-erp.firebaseapp.com",
      projectId: "dmnfood-erp",
      storageBucket: "dmnfood-erp.firebasestorage.app",
      messagingSenderId: "918686575195",
      appId: "1:918686575195:web:699d961aa0a092ee9ead7e",
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      if (!user) {
        window.location.href = '/';
        return;
      }
      const emailId = user.email.split('@')[0];
      document.getElementById('userChip').textContent = emailId;
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('auth-hidden');
      window.PlanningUI.init(user);
    });

    window.handleLogout = async () => {
      if (!confirm('로그아웃 하시겠습니까?')) return;
      await signOut(auth);
      window.location.href = '/';
    };
  </script>
</body>

</html>
