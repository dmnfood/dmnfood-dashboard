<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>들메내식품 · 미청구채권 현황</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="/dashboard/style.css">
  <style>
    /* ── monthlybond.html 전용 스타일 ── */
    .auth-hidden {
      display: none !important;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      background: #070b14;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 999;
    }

    .loading-screen.hidden {
      display: none;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, .12);
      border-top-color: #22d3ee;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .file-loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(7, 11, 20, .85);
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      backdrop-filter: blur(4px);
    }

    .file-loading.active {
      display: flex;
    }

    /* 헤더 */
    .app-header {
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(20px);
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn {
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: transparent;
      color: var(--t2);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s, color .15s;
    }

    .back-btn:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--t0);
    }

    .app-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--t0);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .app-title .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22d3ee;
    }

    .user-chip {
      font-size: 11px;
      color: var(--t2);
      background: rgba(255, 255, 255, .05);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
    }

    .btn-logout-sm {
      height: 28px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 11px;
      color: var(--t2);
      cursor: pointer;
      transition: background .15s, color .15s;
    }

    .btn-logout-sm:hover {
      background: rgba(255, 255, 255, .07);
      color: var(--t0);
    }

    /* 레이아웃 */
    .page-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 28px 60px;
      position: relative;
      z-index: 10;
    }

    /* 자동화 패널 */
    .auto-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, .03);
    }

    .panel-icon {
      width: 28px;
      height: 28px;
      background: rgba(34, 211, 238, .12);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .panel-header-text h2 {
      font-size: 13px;
      font-weight: 600;
      color: var(--t0);
    }

    .panel-header-text p {
      font-size: 11px;
      color: var(--t2);
      margin-top: 1px;
    }

    .panel-body {
      padding: 20px;
    }

    .auto-row {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field-group label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      letter-spacing: .3px;
      text-transform: uppercase;
    }

    .field-group select,
    .field-group input[type="month"] {
      height: 36px;
      padding: 0 12px;
      border: 1px solid var(--in-br);
      border-radius: 6px;
      background: var(--in-bg);
      color: var(--t0);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      cursor: pointer;
    }

    .field-group select {
      min-width: 160px;
    }

    .field-group input[type="month"] {
      min-width: 140px;
    }

    .field-group select option {
      background: #0b1220;
    }

    .date-sep {
      color: var(--t2);
      font-size: 16px;
      padding-bottom: 8px;
    }

    .btn-fetch {
      height: 36px;
      padding: 0 20px;
      background: linear-gradient(135deg, #22d3ee, #6366f1);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .btn-fetch:hover {
      opacity: .88;
    }

    .btn-fetch:disabled {
      opacity: .4;
      cursor: not-allowed;
    }

    .btn-upload {
      height: 36px;
      padding: 0 20px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .btn-upload:hover {
      opacity: .88;
    }

    .auto-status {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 14px;
    }

    .auto-status.running {
      display: flex;
      background: var(--nm-bg);
      color: var(--nm);
      border: 1px solid rgba(96, 165, 250, .25);
    }

    .auto-status.done {
      display: flex;
      background: var(--zr-bg);
      color: var(--zr);
      border: 1px solid rgba(74, 222, 128, .25);
    }

    .auto-status.error {
      display: flex;
      background: var(--rv-bg);
      color: var(--rv);
      border: 1px solid rgba(248, 113, 113, .25);
    }

    .spinner-sm {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0 18px;
      color: var(--t2);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* 드롭존 */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 32px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
      background: var(--card-w);
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: rgba(34, 211, 238, .45);
      background: rgba(34, 211, 238, .05);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .drop-zone-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--t1);
    }

    .drop-zone-sub {
      font-size: 12px;
      color: var(--t2);
      margin-top: 4px;
    }

    .drop-zone-sub strong {
      color: #22d3ee;
    }

    /* 결과 */
    .results {
      display: none;
      margin-top: 20px;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .results.visible {
      display: block;
    }

    /* 요약 카드 */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .s-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      position: relative;
      overflow: hidden;
    }

    .s-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }

    .s-card.red::before {
      background: var(--rv);
    }

    .s-card.blue::before {
      background: var(--nm);
    }

    .s-card.green::before {
      background: var(--zr);
    }

    .s-card.gray::before {
      background: rgba(255, 255, 255, .2);
    }

    .card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1;
      margin-bottom: 4px;
    }

    .s-card.red .card-value {
      color: var(--rv);
    }

    .s-card.blue .card-value {
      color: var(--nm);
    }

    .s-card.green .card-value {
      color: var(--zr);
    }

    .card-sub {
      font-size: 11px;
      color: var(--t2);
    }

    /* 탭 */
    .tabs {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tab-nav {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, .03);
      overflow-x: auto;
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: transparent;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--t2);
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .15s;
    }

    .tab-btn:hover {
      color: var(--t1);
    }

    .tab-btn.active {
      color: var(--t0);
      border-bottom-color: #22d3ee;
      background: rgba(255, 255, 255, .03);
    }

    .tab-badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 20px;
      font-weight: 600;
    }

    .tab-badge.red {
      background: var(--rv-bg);
      color: var(--rv);
    }

    .tab-badge.blue {
      background: var(--nm-bg);
      color: var(--nm);
    }

    .tab-badge.green {
      background: var(--zr-bg);
      color: var(--zr);
    }

    .tab-badge.gray {
      background: rgba(255, 255, 255, .07);
      color: var(--t2);
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    /* 테이블 */
    .table-wrap {
      overflow-x: auto;
      max-height: 500px;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, .05);
      padding: 10px 12px;
      text-align: right;
      font-size: 11px;
      font-weight: 600;
      color: var(--t2);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      z-index: 1;
    }

    thead th:nth-child(1),
    thead th:nth-child(2),
    thead th:nth-child(3) {
      text-align: left;
    }

    tbody tr {
      border-bottom: 1px solid var(--tb-br);
    }

    tbody tr:hover {
      background: var(--tb-hv);
    }

    tbody td {
      padding: 9px 12px;
      white-space: nowrap;
      color: var(--t1);
    }

    tbody td:nth-child(4),
    tbody td:nth-child(5) {
      text-align: right;
    }

    .group-hdr td {
      background: rgba(255, 255, 255, .03) !important;
      font-size: 11px;
      font-weight: 700;
      color: var(--t2);
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 6px 12px;
      border-top: 2px solid var(--border);
    }

    .amt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .amt.neg {
      color: var(--rv);
    }

    .amt.zero {
      color: var(--t2);
    }

    /* 요약 탭 */
    .summary-grid {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .summary-block {
      background: rgba(255, 255, 255, .03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
    }

    .summary-block h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--t2);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .sum-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--tb-br);
      font-size: 12.5px;
    }

    .sum-row:last-child {
      border-bottom: none;
    }

    .sum-row .lbl {
      color: var(--t2);
    }

    .sum-row .val {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 12px;
      color: var(--t1);
    }

    /* 툴바 */
    .toolbar {
      display: flex;
      justify-content: flex-end;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      gap: 8px;
    }

    .btn-sm {
      height: 30px;
      padding: 0 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--t1);
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background .15s;
    }

    .btn-sm:hover {
      background: rgba(255, 255, 255, .07);
    }

    .btn-sm.primary {
      background: rgba(34, 211, 238, .13);
      color: #22d3ee;
      border-color: rgba(34, 211, 238, .28);
    }

    .btn-sm.primary:hover {
      background: rgba(34, 211, 238, .22);
    }

    .empty-state {
      padding: 48px 24px;
      text-align: center;
      color: var(--t2);
      font-size: 13px;
    }

    .empty-state .icon {
      font-size: 36px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <!-- 로딩 스크린 -->
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
  </div>

  <!-- 파일 로딩 오버레이 -->
  <div class="file-loading" id="fileLoading">
    <div class="loading-spinner"></div>
    <div style="font-size:14px;color:var(--t1);font-weight:500">파일 분석 중...</div>
  </div>

  <!-- 배경 블롭 -->
  <div class="blobs">
    <div class="b1"></div>
    <div class="b2"></div>
  </div>

  <!-- 메인 콘텐츠 -->
  <div class="auth-hidden" id="mainContent">
    <header class="app-header">
      <div class="header-left">
        <a href="/home" class="back-btn">← 홈</a>
        <div class="app-title"><span class="dot"></span>미청구채권 현황</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="user-chip" id="userChip">—</span>
        <button class="btn-logout-sm" onclick="handleLogout()">로그아웃</button>
      </div>
    </header>

    <main class="page-main">
      <div class="auto-panel">
        <div class="panel-header">
          <div class="panel-icon">📥</div>
          <div class="panel-header-text">
            <h2>Ecount 연동</h2>
            <p>버튼 클릭 한 번으로 Ecount에서 자동 다운로드</p>
          </div>
        </div>
        <div class="panel-body">
          <div class="auto-row">
            <div class="field-group">
              <label>데이터 소스</label>
              <select id="dataSource">
                <option value="bond">월별채권증감내역</option>
              </select>
            </div>
            <div class="field-group"><label>시작 월</label><input type="month" id="startMonth" /></div>
            <div class="date-sep">—</div>
            <div class="field-group"><label>종료 월</label><input type="month" id="endMonth" /></div>
            <button class="btn-fetch" onclick="triggerFetch()">⚡ Ecount에서 가져오기</button>
            <button class="btn-upload" onclick="document.getElementById('manual-file-input').click()">📂 Excel 직접
              업로드</button>
            <input type="file" id="manual-file-input" accept=".xlsx,.xls" style="display:none"
              onchange="handleFileSelect(this)" />
          </div>
          <div class="auto-status" id="autoStatus"></div>
          <div class="divider">또는 직접 업로드</div>
          <div class="drop-zone" id="dropZone">
            <input type="file" id="ecount-file-input" accept=".xlsx,.xls" onchange="handleFileSelect(this)" />
            <div class="drop-zone-icon">📂</div>
            <div class="drop-zone-text">엑셀 파일을 여기에 끌어다 놓거나 클릭해서 선택</div>
            <div class="drop-zone-sub">Ecount <strong>월별채권증감내역</strong> (.xlsx)</div>
          </div>
        </div>
      </div>

      <div class="results" id="results">
        <div class="summary-cards">
          <div class="s-card red">
            <div class="card-label">① 검토 필요</div>
            <div class="card-value" id="cnt1">0</div>
            <div class="card-sub" id="amt1">잔액 불일치</div>
          </div>
          <div class="s-card blue">
            <div class="card-label">② 정상 미수금</div>
            <div class="card-value" id="cnt2">0</div>
            <div class="card-sub" id="amt2">당월 매출 = 잔액</div>
          </div>
          <div class="s-card green">
            <div class="card-label">③ 정리 완료</div>
            <div class="card-value" id="cnt3">0</div>
            <div class="card-sub">잔액 0</div>
          </div>
          <div class="s-card gray">
            <div class="card-label">전체 거래처</div>
            <div class="card-value" id="cntTotal">0</div>
            <div class="card-sub" id="periodLabel">—</div>
          </div>
        </div>

        <div class="tabs">
          <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('t1',this)">① 검토 필요 <span class="tab-badge red"
                id="b1">0</span></button>
            <button class="tab-btn" onclick="switchTab('t2',this)">② 정상 미수금 <span class="tab-badge blue"
                id="b2">0</span></button>
            <button class="tab-btn" onclick="switchTab('t3',this)">③ 정리 완료 <span class="tab-badge green"
                id="b3">0</span></button>
            <button class="tab-btn" onclick="switchTab('t4',this)">요약 <span class="tab-badge gray">—</span></button>
          </div>
          <div class="tab-pane active" id="t1">
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="text-align:left">그룹</th>
                    <th style="text-align:left">거래처</th>
                    <th style="text-align:left">코드</th>
                    <th>이월잔액</th>
                    <th>최종잔액</th>
                  </tr>
                </thead>
                <tbody id="tb1"></tbody>
              </table>
            </div>
            <div class="toolbar"><button class="btn-sm" onclick="copyTable('t1')">📋 복사</button><button
                class="btn-sm primary" onclick="exportExcel()">📥 엑셀</button></div>
          </div>
          <div class="tab-pane" id="t2">
            <div class="table-wrap">
              <table>
                <thead>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, onAuthStateChanged, signOut }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAlvRWMpYV5Cq2vb0XxpA4t56KuByj8KuE",
      authDomain: "dmnfood-erp.firebaseapp.com",
      projectId: "dmnfood-erp",
      storageBucket: "dmnfood-erp.firebasestorage.app",
      messagingSenderId: "918686575195",
      appId: "1:918686575195:web:699d961aa0a092ee9ead7e",
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      if (!user) { window.location.href = '/'; return; }
      document.getElementById('userChip').textContent = user.email.split('@')[0];
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('mainContent').classList.remove('auth-hidden');
      initApp();
    });

    window.handleLogout = async () => {
      if (!confirm('로그아웃 하시겠습니까?')) return;
      await signOut(auth);
      window.location.href = '/';

  <script>
    const GROUP_ORDER = ['매출처(학교급식)', '매출처(유통)', '매출처(일반)', '매출처(온라인)', '매출처(예식장)', '매출처(일회성)', '매출처(세금계산서X)', '매출처(수출)', '기부단체'];
    let parsedData = null;

    function initApp() {
      const now = new Date();
      const ym = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      document.getElementById('startMonth').value = ym;
      document.getElementById('endMonth').value = ym;
      const zone = document.getElementById('dropZone');
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if (f) processFile(f); });
    }

    function triggerFetch() {
      const s = document.getElementById('startMonth').value;
      const e = document.getElementById('endMonth').value;
      if (!s || !e) return alert('조회 기간을 모두 입력해주세요.');
      if (s > e) return alert('시작 월이 종료 월보다 늦을 수 없습니다.');
      setStatus('running', '⚡ Ecount 자동화 실행 중...');
      const msg = `#ecount-auto-fetch\n보고서: 월별채권증감내역\n조회기간: ${s} ~ ${e}\nEcount 메뉴: 회계 > 채권/채무 > 월별채권증감내역\n완료 후: 이 탭의 파일 입력(id="ecount-file-input")에 다운로드된 파일을 업로드해줘.`;
      if (typeof window.sendPrompt === 'function') window.sendPrompt(msg);
      else setStatus('error', '⚠️ Claude in Chrome이 연결되지 않았습니다.');
    }

    function setStatus(type, msg) {
      const el = document.getElementById('autoStatus');
      el.className = 'auto-status ' + type;
      el.innerHTML = type === 'running' ? `<div class="spinner-sm"></div> ${msg}` : msg;
    }

    function handleFileSelect(input) { if (input.files[0]) processFile(input.files[0]); }

    function processFile(file) {
      setStatus('running', `📂 "${file.name}" 읽는 중...`);
      document.getElementById('fileLoading').classList.add('active');
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, defval: null });
          parsedData = parse(rows);
          setStatus('done', `✅ "${file.name}" 분석 완료 — ${parsedData.all.length}개 거래처`);
          render(parsedData);
        } catch (err) {
          setStatus('error', `❌ 파일 처리 오류: ${err.message}`);
        } finally {
          document.getElementById('fileLoading').classList.remove('active');
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function parse(rows) {
      const all = [];
      let i = 2;
      while (i < rows.length) {
        const row = rows[i]; if (!row) { i++; continue; }
        const code = row[0], name = row[1], group = row[2];
        if (!code && !name) { i++; continue; }
        if (String(name || '').includes('[누계]') || String(code || '').includes('[누계]')) { i++; continue; }
        const balRow = rows[i + 3] || [];
        const last = findLastCol(balRow);
        all.push({
          code: String(code || ''), name: String(name || ''), group: String(group || '(그룹 미지정)'),
          carryOver: toNum(row[4]), latestSales: toNum(row[last - 1]), finalBal: toNum(balRow[last])
        });
        i += 5;
      }
      const cat1 = [], cat2 = [], cat3 = [];
      all.forEach(c => {
        if (c.finalBal === 0) cat3.push({ ...c, cat: 3 });
        else if (c.finalBal > 0 && Math.abs(c.finalBal - c.latestSales) < 1) cat2.push({ ...c, cat: 2 });
        else cat1.push({ ...c, cat: 1 });
      });
      const sort = arr => arr.sort((a, b) => {
        const gi = g => { const i = GROUP_ORDER.indexOf(g); return i === -1 ? GROUP_ORDER.length : i; };
        return gi(a.group) - gi(b.group) || Math.abs(b.finalBal) - Math.abs(a.finalBal);
      });
      return { all, cat1: sort(cat1), cat2: sort(cat2), cat3: sort(cat3) };
    }

    function findLastCol(row) { for (let j = row.length - 1; j >= 0; j--) if (row[j] !== null && row[j] !== undefined && row[j] !== '') return j; return row.length - 1; }
    function toNum(v) { if (v === null || v === undefined || v === '') return 0; const n = parseFloat(String(v).replace(/,/g, '')); return isNaN(n) ? 0 : n; }
    function fmt(n) { if (!n) return '0'; return Math.round(n).toLocaleString('ko-KR'); }
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    function render(d) {
      const { cat1, cat2, cat3, all } = d;
      document.getElementById('cnt1').textContent = cat1.length;
      document.getElementById('cnt2').textContent = cat2.length;
      document.getElementById('cnt3').textContent = cat3.length;
      document.getElementById('cntTotal').textContent = all.length;
      const sum = arr => arr.reduce((s, c) => s + c.finalBal, 0);
      document.getElementById('amt1').textContent = `합계 ${fmt(sum(cat1))}원`;
      document.getElementById('amt2').textContent = `합계 ${fmt(sum(cat2))}원`;
      document.getElementById('b1').textContent = cat1.length;
      document.getElementById('b2').textContent = cat2.length;
      document.getElementById('b3').textContent = cat3.length;
      renderTable('tb1', cat1); renderTable('tb2', cat2); renderTable('tb3', cat3);
      renderSummary(d);
      document.getElementById('results').classList.add('visible');
    }

    function renderTable(id, list) {
      const tb = document.getElementById(id);
      if (!list.length) { tb.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="icon">✅</div>해당 없음</div></td></tr>`; return; }
      let html = '', last = null;
      list.forEach(c => {
        if (c.group !== last) { html += `<tr class="group-hdr"><td colspan="5">${esc(c.group)}</td></tr>`; last = c.group; }
        const bc = c.finalBal < 0 ? 'neg' : c.finalBal === 0 ? 'zero' : '';
        html += `<tr><td style="color:var(--t2);font-size:11px">${esc(c.group)}</td><td><strong>${esc(c.name)}</strong></td><td style="color:var(--t2);font-family:'JetBrains Mono',monospace;font-size:11px">${esc(c.code)}</td><td class="amt">${fmt(c.carryOver)}</td><td class="amt ${bc}">${fmt(c.finalBal)}</td></tr>`;
      });
      tb.innerHTML = html;
    }

    function renderSummary(d) {
      const { cat1, cat2, cat3, all } = d;
      const gs = {};
      all.forEach(c => {
        if (!gs[c.group]) gs[c.group] = { check: 0, normal: 0, done: 0, amt: 0 };
        const g = gs[c.group]; g.amt += c.finalBal;
        if (c.cat === 1) g.check++; else if (c.cat === 2) g.normal++; else g.done++;
      });
      const ordered = [...GROUP_ORDER, '(그룹 미지정)'].filter(g => gs[g]);
      let gHtml = '<div class="summary-block" style="grid-column:1/-1"><h3>그룹별 현황</h3>';
      ordered.forEach(g => {
        const s = gs[g];
        gHtml += `<div class="sum-row"><span class="lbl">${esc(g)}</span><span class="val"><span style="color:var(--rv)">검토${s.check}</span> / <span style="color:var(--nm)">정상${s.normal}</span> / <span style="color:var(--zr)">완료${s.done}</span> &nbsp;${fmt(s.amt)}원</span></div>`;
      });
      gHtml += '</div>';
      const sum = arr => arr.reduce((s, c) => s + c.finalBal, 0);
      const oHtml = `<div class="summary-block"><h3>전체 현황</h3><div class="sum-row"><span class="lbl">전체 거래처</span><span class="val">${all.length}개</span></div><div class="sum-row"><span class="lbl" style="color:var(--rv)">① 검토 필요</span><span class="val" style="color:var(--rv)">${cat1.length}개</span></div><div class="sum-row"><span class="lbl" style="color:var(--nm)">② 정상 미수금</span><span class="val" style="color:var(--nm)">${cat2.length}개</span></div><div class="sum-row"><span class="lbl" style="color:var(--zr)">③ 정리 완료</span><span class="val" style="color:var(--zr)">${cat3.length}개</span></div></div>`;
      const t5 = `<div class="summary-block"><h3>검토 필요 상위 5개</h3>${cat1.slice(0, 5).map(c => `<div class="sum-row"><span class="lbl">${esc(c.name)}</span><span class="val" style="color:var(--rv)">${fmt(c.finalBal)}원</span></div>`).join('')}</div>`;
      document.getElementById('summaryGrid').innerHTML = oHtml + t5 + gHtml;
    }

    function exportExcel() {
      if (!parsedData) return;
      const { cat1, cat2, cat3, all } = parsedData;
      const wb = XLSX.utils.book_new();
      const toSheet = (arr, name) => { const ws = XLSX.utils.aoa_to_sheet([['그룹', '거래처명', '거래처코드', '이월잔액', '최종잔액'], ...arr.map(c => [c.group, c.name, c.code, c.carryOver, c.finalBal])]); XLSX.utils.book_append_sheet(wb, ws, name); };
      toSheet(cat1, '①검토필요'); toSheet(cat2, '②정상(당월미수금)'); toSheet(cat3, '③정리완료');
      const sw = XLSX.utils.aoa_to_sheet([['구분', '거래처수', '잔액합계'], ['① 검토 필요', cat1.length, cat1.reduce((s, c) => s + c.finalBal, 0)], ['② 정상 미수금', cat2.length, cat2.reduce((s, c) => s + c.finalBal, 0)], ['③ 정리 완료', cat3.length, 0], ['합계', all.length, all.reduce((s, c) => s + c.finalBal, 0)]]);
      XLSX.utils.book_append_sheet(wb, sw, '요약');
      XLSX.writeFile(wb, `월별채권증감내역_${new Date().toISOString().split('T')[0]}.xlsx`);
    }

    function switchTab(id, btn) {
      document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active'); btn.classList.add('active');
    }

    function copyTable(tabId) {
      const t = document.querySelector(`#${tabId} table`); if (!t) return;
      const r = document.createRange(); r.selectNode(t);
      window.getSelection().removeAllRanges(); window.getSelection().addRange(r);
      document.execCommand('copy'); window.getSelection().removeAllRanges();
      alert('복사되었습니다.');
    }
  </script>
