<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>들메내식품 · 로그인</title>
  <link rel="stylesheet" href="/dashboard/style.css">
  <style>
    /* 로그인 전용 추가 스타일 */
    .company-code-wrap input {
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .btn-login {
      width: 100%;
      height: 46px;
      background: linear-gradient(135deg, #22d3ee, #6366f1);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity .15s;
      margin-top: 24px;
    }

    .btn-login:hover {
      opacity: .88;
    }

    .btn-login:disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, .4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .error-msg {
      display: none;
      background: var(--rv-bg);
      border: 1px solid rgba(248, 113, 113, .25);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--rv);
      margin-top: 16px;
    }

    .error-msg.visible {
      display: block;
    }

    .footer-note {
      text-align: center;
      font-size: 11px;
      color: var(--t2);
      margin-top: 28px;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <!-- 배경 블롭 -->
  <div class="blobs">
    <div class="b1"></div>
    <div class="b2"></div>
  </div>

  <!-- 로그인 카드 -->
  <div class="main-center">
    <div class="login-card">

      <!-- 브랜드 -->
      <div class="login-logo-wrap">
        <div class="login-logo">🌿</div>
        <div class="login-title">들메내식품</div>
        <div class="login-sub">내부 대시보드 시스템</div>
      </div>

      <!-- 폼 -->
      <div class="form-group">
        <label class="form-label">회사코드</label>
        <div class="company-code-wrap">
          <input class="input" type="text" id="companyCode" placeholder="회사코드 입력" autocomplete="off" maxlength="20" />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">아이디</label>
        <input class="input" type="text" id="userId" placeholder="Ecount 아이디" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input class="input" type="password" id="password" placeholder="비밀번호" autocomplete="current-password" />
      </div>

      <div class="error-msg" id="errorMsg"></div>

      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <div class="spinner" id="spinner"></div>
        <span id="loginBtnText">로그인</span>
      </button>

      <div class="footer-note">
        접속 문의: 이승표 대표<br>Ecount 로그인 정보와 동일하게 입력하세요
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
      from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyAlvRWMpYV5Cq2vb0XxpA4t56KuByj8KuE",
      authDomain: "dmnfood-erp.firebaseapp.com",
      projectId: "dmnfood-erp",
      storageBucket: "dmnfood-erp.firebasestorage.app",
      messagingSenderId: "918686575195",
      appId: "1:918686575195:web:699d961aa0a092ee9ead7e",
    };
    const COMPANY_CODE_EXPECTED = "626882";

    const app = initializeApp(FIREBASE_CONFIG);
    const auth = getAuth(app);

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = '/home';
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

    window.handleLogin = async function () {
      const el = id => document.getElementById(id);
      el('errorMsg').classList.remove('visible');
      const companyCode = el('companyCode').value.trim().toUpperCase();
      const userId = el('userId').value.trim();
      const password = el('password').value;

      if (!companyCode) return showError('회사코드를 입력해주세요.');
      if (!userId) return showError('아이디를 입력해주세요.');
      if (!password) return showError('비밀번호를 입력해주세요.');
      if (companyCode !== COMPANY_CODE_EXPECTED) return showError('회사코드가 올바르지 않습니다.');

      el('loginBtn').disabled = true;
      el('spinner').style.display = 'block';
      el('loginBtnText').textContent = '확인 중...';

      try {
        const email = `${userId.toLowerCase()}@${companyCode.toLowerCase()}.dmnfood`;
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = '/home';
      } catch (err) {
        const msg = {
          'auth/user-not-found': '등록되지 않은 아이디입니다.',
          'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
          'auth/invalid-credential': '아이디 또는 비밀번호가 올바르지 않습니다.',
          'auth/too-many-requests': '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.',
        }[err.code] || `로그인 오류: ${err.message}`;
        showError(msg);
      } finally {
        el('loginBtn').disabled = false;
        el('spinner').style.display = 'none';
        el('loginBtnText').textContent = '로그인';
      }
    };

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }
  </script>
</body>

</html>
