<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>들메내식품 · 로그인</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --border: #e2e5ea;
            --border-strong: #c9cdd4;
            --text-primary: #1a1d23;
            --text-secondary: #5a6070;
            --text-muted: #8d94a3;
            --accent: #1a56db;
            --accent-hover: #1447c8;
            --red: #e02020;
            --red-light: #fdf0f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 20% 50%, rgba(26, 86, 219, .06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(26, 86, 219, .04) 0%, transparent 50%);
            pointer-events: none;
        }

        .login-card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .10);
            padding: 48px 44px;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 1;
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            width: 48px;
            height: 48px;
            background: var(--accent);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 14px;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 14px;
            color: var(--text-primary);
            background: #fafbfc;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 3px rgba(26, 86, 219, .1);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .company-code-wrap input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-login {
            width: 100%;
            height: 46px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background .15s;
            box-shadow: 0 3px 12px rgba(26, 86, 219, .3);
            margin-top: 24px;
        }

        .btn-login:hover {
            background: var(--accent-hover);
        }

        .btn-login:disabled {
            background: var(--border-strong);
            box-shadow: none;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, .4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            display: none;
            background: var(--red-light);
            border: 1px solid #f5c2c2;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            color: var(--red);
            margin-top: 16px;
        }

        .error-msg.visible {
            display: block;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 28px;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="brand">
            <div class="brand-logo">🌿</div>
            <div class="brand-name">들메내식품</div>
            <div class="brand-sub">내부 대시보드 시스템</div>
        </div>
        <div class="form-group">
            <label>회사코드</label>
            <div class="company-code-wrap">
                <input type="text" id="companyCode" placeholder="회사코드 입력" autocomplete="off" maxlength="20" />
            </div>
        </div>
        <div class="form-group">
            <label>아이디</label>
            <input type="text" id="userId" placeholder="Ecount 아이디" autocomplete="username" />
        </div>
        <div class="form-group">
            <label>비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호" autocomplete="current-password" />
        </div>
        <div class="error-msg" id="errorMsg"></div>
        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            <div class="spinner" id="spinner"></div>
            <span id="loginBtnText">로그인</span>
        </button>
        <div class="footer-note">접속 문의: 이승표 대표<br>Ecount 로그인 정보와 동일하게 입력하세요</div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const FIREBASE_CONFIG = {
            apiKey: "AIzaSyAlvRWMpYV5Cq2vb0XxpA4t56KuByj8KuE",
            authDomain: "dmnfood-erp.firebaseapp.com",
            projectId: "dmnfood-erp",
            storageBucket: "dmnfood-erp.firebasestorage.app",
            messagingSenderId: "918686575195",
            appId: "1:918686575195:web:699d961aa0a092ee9ead7e",
        };
        const COMPANY_CODE_EXPECTED = "626882"; // 대문자로

        const app = initializeApp(FIREBASE_CONFIG);
        const auth = getAuth(app);

        onAuthStateChanged(auth, user => {
            if (user) window.location.href = '/home';
        });

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

        window.handleLogin = async function () {
            const el = id => document.getElementById(id);
            el('errorMsg').classList.remove('visible');
            const companyCode = el('companyCode').value.trim().toUpperCase();
            const userId = el('userId').value.trim();
            const password = el('password').value;

            if (!companyCode) return showError('회사코드를 입력해주세요.');
            if (!userId) return showError('아이디를 입력해주세요.');
            if (!password) return showError('비밀번호를 입력해주세요.');
            if (companyCode !== COMPANY_CODE_EXPECTED) return showError('회사코드가 올바르지 않습니다.');

            el('loginBtn').disabled = true;
            el('spinner').style.display = 'block';
            el('loginBtnText').textContent = '확인 중...';

            try {
                const email = `${userId.toLowerCase()}@${companyCode.toLowerCase()}.dmnfood`;
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = '/home';
            } catch (err) {
                const msg = {
                    'auth/user-not-found': '등록되지 않은 아이디입니다.',
                    'auth/wrong-password': '비밀번호가 올바르지 않습니다.',
                    'auth/invalid-credential': '아이디 또는 비밀번호가 올바르지 않습니다.',
                    'auth/too-many-requests': '로그인 시도가 너무 많습니다. 잠시 후 다시 시도해주세요.',
                }[err.code] || `로그인 오류: ${err.message}`;
                showError(msg);
            } finally {
                el('loginBtn').disabled = false;
                el('spinner').style.display = 'none';
                el('loginBtnText').textContent = '로그인';
            }
        };

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg; el.classList.add('visible');
        }
    </script>
</body>

</html>
